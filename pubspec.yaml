version: 0.1.3
homepage: https://github.com/KhushneetSingh/autolingo
repository: https://github.com/KhushneetSingh/autolingo

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

executables:
  autolingo: autolingo
